<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トリアージ - BirdProject</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f7fa; color: #2c3e50; }
    header { background: #fff; padding: 12px 16px; border-bottom: 1px solid #e1e8ed; display: flex; align-items: center; gap: 16px; }
    header h1 { font-size: 1.1rem; margin: 0; }
    header a { color: #2980b9; text-decoration: none; font-size: 0.9rem; margin-left: auto; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 18px 16px; }
    .progress { font-size: 0.85rem; color: #888; margin-bottom: 10px; }
    .card { background: #fff; border-radius: 10px; padding: 20px; border: 1px solid #e1e8ed; box-shadow: 0 1px 4px rgba(0,0,0,.05); }
    .sp { font-size: 1.4rem; font-weight: 700; }
    .sp small { font-size: 0.9rem; font-weight: 400; color: #888; }
    .meta { color: #888; font-size: 0.85rem; margin: 4px 0 10px; }
    .conf { font-size: 0.9rem; margin-bottom: 8px; }
    .season-in { color: #27ae60; } .season-out { color: #b9770e; }
    audio { width: 100%; margin: 8px 0; }
    canvas { width: 100%; image-rendering: pixelated; background: #111; border-radius: 4px; }
    .btns { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    .btns button { flex: 1; min-width: 120px; padding: 12px 0; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; color: #fff; }
    .b-confirm { background: #27ae60; } .b-noise { background: #7f8c8d; }
    .b-correct { background: #2980b9; } .b-wrong { background: #c0392b; }
    .b-skip { background: #bdc3c7; color: #333; }
    .keys { font-size: 0.78rem; color: #aaa; margin-top: 12px; }
    .done { text-align: center; padding: 40px; font-size: 1.1rem; color: #27ae60; }
  </style>
</head>
<body>
  <header>
    <h1>トリアージ（pending {{ rows|length }} 件）</h1>
    <a href="/">← 検出一覧</a>
  </header>
  <div class="wrap">
    <div class="progress" id="progress"></div>
    <div id="card-host"></div>
    <div class="keys">ショートカット: <b>c</b>=確定 / <b>n</b>=ノイズ / <b>1</b>=正解ラベル / <b>2</b>=誤りラベル / <b>j</b>=次 / <b>k</b>=前 / <b>s</b>=スペクトログラム</div>
  </div>

  <script src="/static/spectrogram.js"></script>
  <script>
    const ROWS = {{ rows|tojson }};
    let i = 0;
    const host = document.getElementById('card-host');
    const prog = document.getElementById('progress');

    function audioUrl(fp) { return '/audio/' + fp.replace(/^\/+/, ''); }

    function render() {
      const done = ROWS.filter(r => r._done).length;
      prog.textContent = `処理済 ${done} / ${ROWS.length}`;
      // 未処理で現在位置以降の最初を探す
      while (i < ROWS.length && ROWS[i]._done) i++;
      if (i >= ROWS.length) { host.innerHTML = '<div class="done">✓ pending はすべて処理しました</div>'; return; }
      const r = ROWS[i];
      let season = '';
      if (r.in_season === true) season = '<span class="season-in">在期</span>';
      else if (r.in_season === false) season = '<span class="season-out">⚠季節外</span>';
      const conf = (r.confidence != null) ? (r.confidence*100).toFixed(1)+'%' : '—';
      host.innerHTML = `
        <div class="card">
          <div class="sp">${r.species_jp || r.species || '不明'} <small>${r.scientific_name||''}</small> ${season}</div>
          <div class="meta">${(r.timestamp||'').slice(0,16)} · ${r.pi_id||''} · id ${r.id}</div>
          <div class="conf">確信度: <b>${conf}</b> ${r.det_count?('· x'+r.det_count):''}</div>
          ${r.file_path ? `<audio controls autoplay src="${audioUrl(r.file_path)}"></audio>
          <canvas id="spec"></canvas>` : ''}
          <div class="btns">
            <button class="b-confirm" onclick="act('confirm')">確定 (c)</button>
            <button class="b-noise" onclick="act('noise')">ノイズ (n)</button>
            <button class="b-correct" onclick="act('correct')">正解 (1)</button>
            <button class="b-wrong" onclick="act('wrong')">誤り (2)</button>
            <button class="b-skip" onclick="nav(1)">スキップ (j)</button>
          </div>
        </div>`;
    }

    async function post(url, body) {
      try { await fetch(url, { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body, redirect:'manual' }); }
      catch(e) {}
    }
    async function act(kind) {
      const r = ROWS[i];
      if (kind === 'confirm') await post('/update/'+r.id, 'new_status=confirmed&redirect_status=&redirect_pi_id=');
      else if (kind === 'noise') await post('/update/'+r.id, 'new_status=noise&redirect_status=&redirect_pi_id=');
      else if (kind === 'correct') await post('/api/label/'+r.id, 'label=correct');
      else if (kind === 'wrong') await post('/api/label/'+r.id, 'label=wrong');
      r._done = true; nav(1);
    }
    function nav(d) { i += d; if (i < 0) i = 0; render(); }
    function showSpec() { const cv = document.getElementById('spec'); const r = ROWS[i]; if (cv && r.file_path) renderSpectrogram(cv, audioUrl(r.file_path)); }

    document.addEventListener('keydown', e => {
      if (['c','n','1','2','j','k','s'].includes(e.key)) e.preventDefault();
      if (e.key === 'c') act('confirm');
      else if (e.key === 'n') act('noise');
      else if (e.key === '1') act('correct');
      else if (e.key === '2') act('wrong');
      else if (e.key === 'j') nav(1);
      else if (e.key === 'k') nav(-1);
      else if (e.key === 's') showSpec();
    });
    render();
  </script>
</body>
</html>
